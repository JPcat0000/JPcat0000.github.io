<html>
<head>
    <title>簡歷</title>
</head>
<body>
    <h1>你是誰</h1>
    <p>在這裡描述你自己，包括你的背景和經歷。</p>

    <h2>你在做什麼</h2>
    <p>解釋你目前的工作、項目或與其他人合作的情況。</p>

    <h2>你的核心觀點</h2>
    <p>分享你在專業領域中的關鍵信念和價值觀。</p>

    <h2>你長期關注的問題</h2>
    <p>列出你關注的問題和挑戰，以及你為解決這些問題所做的努力。</p>

    <h2>你的思考方式</h2>
    <p>簡述你的思考風格和如何處理資訊或挑戰。</p>

    <h2>你的表達風格</h2>
    <p>描述你如何與他人交流，包括口語和書面交流的風格。</p>

    <h2>協作禁忌</h2>
    <p>指出在合作過程中你需要避免的一些情況或行為。</p>

    <h2>人物標籤</h2>
    <p>列出可以描述你個性的關鍵詞或標籤。</p>
</body>
</html>
